name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  docker-tests:
    name: Docker E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run API E2E tests with Docker Compose
        run: docker compose up test --abort-on-container-exit --exit-code-from test

      - name: Build and run production containers
        run: docker compose up -d app db

      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000; then
              echo "App is ready"
              exit 0
            fi
            sleep 5
          done
          echo "App failed to start"
          exit 1

      - name: Run UI E2E tests
        run: |
          docker compose exec -T app npx playwright test e2e/ui --project=chromium
        env:
          DATABASE_URL: postgresql://postgres:postgres@db:5432/aroundme?schema=public

      - name: Show logs on failure
        if: failure()
        run: docker compose logs
